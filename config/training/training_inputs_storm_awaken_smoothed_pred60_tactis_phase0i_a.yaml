## ============================================================================
## TACTiS-2 PHASE 0i-A — recommendation #1 ablation: looser a_max + stronger λ_log
## ============================================================================
## Hypothesis: Phase 0h's a_max=3 cap was too tight, producing overconfident
## ensembles (mean ens_std=0.015 m/s, 50× too narrow vs |error|; 0% beating
## persistence on CRPS). Loosen the mechanical cap to give the model room to
## express realistic uncertainty (~0.5-1.5 m/s for short-horizon wind), and
## strengthen the per-(b,v) log-density penalty so it (not the cap) handles
## any contexts that try to runaway-sharpen.
##
## Changes vs Phase 0h:
##   a_max:                3.0 → 10.0          (3.3× looser cap)
##   lambda_log_density:   0.5 → 1.5           (3× stronger per-datapoint penalty)
##   log_density_max:      0.0  (unchanged — penalty engages whenever log p > 0)
##   data_path:            smoothed (unchanged for this ablation)
##
## Other Trial #65 winning hparams unchanged. 100 epochs (30 S1 + 70 S2) — same
## compute as Phase 0h for clean A/B.
##
## Expected outcome (if hypothesis right):
##   - a_reg/max_a should sit in [3, 10] instead of saturating at the cap (was 2.82)
##   - log_density_reg/loss_term_epoch should be NON-ZERO (Phase 0h was 0)
##   - CRPS validation: ens_std mean ~0.5-1 m/s, beats persistence on >50% of turbines
## ============================================================================

experiment:
  username: jmb0507
  project_name: train_phase0i_a_smoothed_amax10
  run_name: phase0i_a_smoothed_amax10_lld1p5
  project_root: /user/taed7566/Forecasting/wind-forecasting
  log_dir: /dss/work/taed7566/Forecasting_Outputs/wind-forecasting/logs/
  notes: "PHASE 0i-A — recommendation #1 ablation: a_max=10 + lambda_log_density=1.5 on smoothed data"
  extra_tags: ["tactis2", "phase0i_a", "smoothed", "pred60", "ctx80", "deeper_fix_v2", "amax10", "stronger_lld"]

logging:
  entity: jmb0507-cu-boulder
  wandb_mode: online
  save_code: false
  wandb_dir: /dss/work/taed7566/Forecasting_Outputs/wind-forecasting/logs
  optuna_dir: /dss/work/taed7566/Forecasting_Outputs/wind-forecasting/optuna
  checkpoint_dir: /dss/work/taed7566/Forecasting_Outputs/wind-forecasting/checkpoints
  chkp_dir_suffix: "_phase0i_a_smoothed_amax10"
  slurm_output_dir: /dss/work/taed7566/Forecasting_Outputs/wind-forecasting/logs/slurm_logs

optuna:
  visualization:
    enabled: false

dataset:
  sampler: "random"
  data_path: /dss/work/taed7566/Forecasting_Outputs/wind-forecasting/DATA/preprocessed_awaken_data/awaken_processed_smoothed_normalized.parquet
  normalization_consts_path: /dss/work/taed7566/Forecasting_Outputs/wind-forecasting/DATA/preprocessed_awaken_data/awaken_processed_smoothed_normalization_consts.csv
  context_length: 1200
  prediction_length: 60
  target_turbine_ids:
  normalize: false
  batch_size: 64
  base_batch_size: 128
  workers: 4
  overfit: false
  test_split: 0.10
  val_split: 0.10
  resample_freq: 15s
  n_splits: 1
  per_turbine_target: true
  use_pytorch_dataloader: true

model:
  distr_output:
    class: LowRankMultivariateNormalOutput
    kwargs:
      rank: 8

  ## TACTiS-2 — Trial #65 winning architecture (unchanged from Phase 0h) ##
  tactis:
    initial_stage: 1
    stage2_start_epoch: 30
    input_encoding_normalization: true
    scaling: "std"
    loss_normalization: "none"
    encoder_type: "standard"
    num_parallel_samples: 200
    bagging_size: null

    marginal_embedding_dim_per_head: 32
    marginal_num_heads: 4
    marginal_num_layers: 3
    flow_input_encoder_layers: 5
    flow_series_embedding_dim: 16

    copula_embedding_dim_per_head: 8
    copula_num_heads: 5
    copula_num_layers: 2
    copula_input_encoder_layers: 1
    copula_series_embedding_dim: 48
    ac_mlp_num_layers: 2
    ac_mlp_dim: 128

    decoder_dsf_num_layers: 3
    decoder_dsf_hidden_dim: 64
    decoder_mlp_num_layers: 2
    decoder_mlp_hidden_dim: 8
    decoder_transformer_num_layers: 4
    decoder_transformer_embedding_dim_per_head: 64
    decoder_transformer_num_heads: 5
    decoder_num_bins: 100

    stage1_activation_function: "relu"
    lr_stage1: 9.881673103861262e-06
    weight_decay_stage1: 0.0
    gradient_clip_val_stage1: 5.0
    eta_min_fraction_s1: 0.0010773892179890717
    warmup_steps_s1: 0.10
    steps_to_decay_s1: 0.90

    stage2_activation_function: "relu"
    lr_stage2: 2.0e-6
    weight_decay_stage2: 1.0e-5
    gradient_clip_val_stage2: 1.0
    eta_min_fraction_s2: 0.01
    warmup_steps_s2: 0.10
    steps_to_decay_s2: 0.90

    dropout_rate: 0.005

    # v1 reg (Fix D — kept unchanged)
    lambda_a_reg: 0.45969083674293004
    a_reg_threshold: 3.0

    # v2 deeper-fix — CHANGED for this ablation
    lambda_log_density: 1.5            # was 0.5; 3× stronger so penalty (not cap) handles outliers
    log_density_max: 0.0
    a_max: 10.0                        # was 3.0; 3.3× looser → realistic uncertainty bandwidth

callbacks:
  progress_bar:
    class_path: lightning.pytorch.callbacks.TQDMProgressBar
    init_args:
      refresh_rate: 100
      leave: true
  model_checkpoint:
    class_path: lightning.pytorch.callbacks.ModelCheckpoint
    init_args:
      dirpath: ${logging.checkpoint_dir}
      filename: '{epoch}-{step}-{val_loss:.2f}'
      monitor: 'val_loss'
      mode: 'min'
      save_top_k: 1
      save_last: true
      verbose: true
  model_checkpoint_periodic:
    class_path: lightning.pytorch.callbacks.ModelCheckpoint
    init_args:
      dirpath: ${logging.checkpoint_dir}
      filename: 'periodic-{epoch}-{step}'
      every_n_epochs: 5
      save_top_k: -1
      save_last: false
      monitor: null
      verbose: true
  model_checkpoint_stage2:
    class_path: lightning.pytorch.callbacks.ModelCheckpoint
    init_args:
      dirpath: ${logging.checkpoint_dir}
      filename: 'best_copula_{epoch}_{val_copula_loss:.4f}'
      monitor: val_copula_loss
      mode: min
      save_top_k: 3
      save_last: false
      verbose: true
  lr_monitor:
    class_path: lightning.pytorch.callbacks.LearningRateMonitor
    init_args:
      logging_interval: step
      log_momentum: false
  dead_neuron_monitor:
    enabled: false
  marginal_health_monitor:
    enabled: false

trainer:
  val_check_interval: 1.0
  accelerator: gpu
  devices: auto
  num_nodes: 1
  strategy: ddp
  max_epochs: 100
  limit_train_batches: 5000
  log_every_n_steps: 100
