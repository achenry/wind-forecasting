experiment:
  username: aoife-henry
  project_name: wind_forecasting_awaken_pred60
  run_name: kestrel_awaken_pred60
  log_dir: /projects/awaken/ahenry/wind_forecasting/logging/
  project_root: c
  notes: "Quantile head + pinball + ES"
  extra_tags: ["awaken", "pred60", "tactis2", "quantile", "pinball+ES", "K11", "monotonic_delta", "unsmoothed"] # By default already has GPU id, model and mode.

logging:
  entity: jmb0507-cu-boulder # Wandb entity (group name)
  wandb_mode: online
  save_code: false # Save code to wandb
  wandb_dir: /projects/awaken/ahenry/wind_forecasting/logging/ # WandB will create a 'wandb' subdirectory here automatically
  optuna_dir: /projects/awaken/ahenry/wind_forecasting/logging/optuna/
  checkpoint_dir: /projects/awaken/ahenry/wind_forecasting/logging/checkpoints/
  chkp_dir_suffix: "_60"
  slurm_output_dir: /projects/awaken/ahenry/wind_forecasting/logging/slurm_logs/

optuna:
  save_trial_code: false      # Default false
  n_trials_per_worker: 100   # Replaced by total_study_trials for global trial limit
  total_study_trials: 200     # Global maximum number of trials across all workers, takes precedence over n_trials_per_worker
  max_epochs: 25              # epochs per trial
  sampler: "random"           # Options: "random" (ExpectedNumInstanceSampler), "sequential" (SequentialSampler)
  sampler_params:
    tpe:
      n_startup_trials: 8
      multivariate: true
      constant_liar: true
      group: false
  base_limit_train_batches: 5000    # base batches per epoch - will be scaled based on batch_size ratio
  metric: "val_loss"          # The metric to optimize (NLL)
  direction: "minimize"       # Whether to minimize or maximize the metric

  resample_freq_choices: [15, 30, 45, 60] # Resample frequency in seconds
  
  # Pruning configuration
  pruning:
    enabled: true
    type: "successivehalving"
    min_resource: 5
    reduction_factor: 2
    min_early_stopping_rate: 0
    bootstrap_count: 5
    # enabled: true
    # type: "patient"
    # patience: 2               # Configure PatientPruner: number of steps to wait (epochs) before pruning
    # min_delta: 0.0            # Configure PatientPruner: tolerance for improvement (default 0.0)
    # wrapped_pruner:
    #   type: "percentile"      # Set the wrapped pruner type
    #   percentile: 50.0        # Configure PercentilePruner: prune trials below this percentile
    #   n_startup_trials: 4     # Configure PercentilePruner: wait for this many trials before pruning
    #   n_warmup_steps: 4      # Configure PercentilePruner: wait for this many steps (epochs) before pruning
    # type: "hyperband"
      # type: "successivehalving"
      # min_resource: 8             # Applies to SuccessiveHalving and Hyperband
      # max_resource: 10           # Applies to Hyperband only
      # reduction_factor: 2         # Applies to SuccessiveHalving and Hyperband
      # bootstrap_count: 0          # Number of trials to complete before pruning

  # Optuna visualization configuration (additional to wandb)
  visualization:
    enabled: true
    output_dir: ${logging.optuna_dir}/visualizations
    plots:
      optimization_history: true
      parameter_importance: true
      slice_plot: true
      
  # Storage backend configuration
  storage:
    backend: "mysql"  # Options: "postgresql", "sqlite", "mysql", "journal"
    # --- SQLite Specific Settings (not used if backend is postgresql) ---
    # storage_dir: /projects/awaken/ahenry/wind_forecasting/optuna
    sqlite_wal: true  # Enable WAL mode for SQLite
    sqlite_timeout: 600 # Timeout in seconds for SQLite locks

    # --- MySQL Specific Settings --- #
    db_host: tlv51ahenry01.nrel.gov # 10.121.2.72
    db_port: 3306
    db_user: optuna_user

    # --- Optional TCP/IP Settings (if use_socket is false) ---
    # use_tcp: false
    # db_host: "localhost"
    # db_port: 5432

    # --- Optional Command Execution Settings ---
    # run_cmd_shell: false # Set to true if specific commands require shell=True
    
  # Optuna Dashboard auto-launch configuration
  dashboard:
    enabled: true             # Set to true to automatically launch the dashboard on rank 0
    port: 8088                # Port for the dashboard web server
    log_file: "${logging.optuna_dir}/optuna_dashboard.log" # Log file for the dashboard process


dataset: 
    # data_path: /projects/awaken/ahenry/wind_forecasting/awaken_data/awaken_processed_unsmoothed_normalized.parquet
    # normalization_consts_path: /projects/awaken/ahenry/wind_forecasting/awaken_data/awaken_processed_unsmoothed_normalization_consts.csv
    data_path: /scratch/ahenry/kfs3-flash/awaken_processed_unsmoothed_normalized.parquet
    normalization_consts_path: /scratch/ahenry/kfs3-flash/awaken_processed_unsmoothed_normalization_consts.csv
    context_length: 1200 # in seconds
    prediction_length: 60 # in seconds
    target_turbine_ids: # or leave blank to capture all
    normalize: false 
    batch_size: 64
    base_batch_size: 128
    workers: 4
    overfit: false
    test_split: 0.10
    val_split: 0.10
    resample_freq: 15s
    n_splits: 1
    per_turbine_target: true
    use_pytorch_dataloader: true

model:
  distr_output: 
    class: LowRankMultivariateNormalOutput
    kwargs:
      rank: 8
  
  ############# MODEL-SPECIFIC PARAMETERS ##############
  # [ TACTiS-2 ]
  tactis:
    # General TACTiS settings
    initial_stage: 1
    stage2_start_epoch: 30
    input_encoding_normalization: true
    scaling: "std"
    loss_normalization: "none"
    encoder_type: "standard"
    num_parallel_samples: 200
    bagging_size: null

    marginal_embedding_dim_per_head: 32
    marginal_num_heads: 4
    marginal_num_layers: 3
    flow_input_encoder_layers: 5
    flow_series_embedding_dim: 16

    copula_embedding_dim_per_head: 8
    copula_num_heads: 5
    copula_num_layers: 2
    copula_input_encoder_layers: 1
    copula_series_embedding_dim: 48
    ac_mlp_num_layers: 2
    ac_mlp_dim: 128

    decoder_dsf_num_layers: 3
    decoder_dsf_hidden_dim: 64
    decoder_mlp_num_layers: 2
    decoder_mlp_hidden_dim: 8
    decoder_transformer_num_layers: 4
    decoder_transformer_embedding_dim_per_head: 64
    decoder_transformer_num_heads: 5
    decoder_num_bins: 100

    stage1_activation_function: "relu"
    lr_stage1: 9.881673103861262e-06
    weight_decay_stage1: 0.0
    gradient_clip_val_stage1: 5.0
    eta_min_fraction_s1: 0.0010773892179890717
    warmup_steps_s1: 0.10
    steps_to_decay_s1: 0.90

    stage2_activation_function: "relu"
    lr_stage2: 2.0e-6
    weight_decay_stage2: 1.0e-5
    gradient_clip_val_stage2: 1.0
    eta_min_fraction_s2: 0.01
    warmup_steps_s2: 0.10
    steps_to_decay_s2: 0.90

    dropout_rate: 0.005

    # DSF regularizers all disabled (quantile head bypasses DSF)
    lambda_a_reg: 0.0
    a_reg_threshold: 3.0
    lambda_log_density: 0.0
    log_density_max: 0.0
    a_max: 0.0
    lambda_a_floor: 0.0
    a_floor_threshold: 0.5
    lambda_w_entropy: 0.0
    w_entropy_min: 2.0

    marginal_flow_type: quantile
    decoder_quantile_levels: [0.01, 0.05, 0.1, 0.25, 0.4, 0.5, 0.6, 0.75, 0.9, 0.95, 0.99]
    decoder_quantile_mlp_layers: 2
    decoder_quantile_mlp_dim: 64
    decoder_quantile_crossing_fix: monotonic_delta

    # Sd Energy Score regularizer
    lambda_energy_score: 0.5   # G4 winning value
    energy_score_num_samples: 8
    lambda_variogram: 0.0
    variogram_p: 0.5
    trajectory_noise_std: 0.0

  informer:
    # embedding_dimension: [32] # Determines dimension of the embedding space
    # num_encoder_layers: 2 # Number of transformer blocks stacked
    # num_decoder_layers: 1 # Number of transformer blocks stacked
    # n_heads: 8 # Number of heads for spatio-temporal attention
    # d_model: 512
    # dim_feedforward: 2048
    # activation: relu
    context_length_factor: 2
    num_encoder_layers: 2
    num_decoder_layers: 2
    d_model: 128
    n_heads: 8
    factor: 5
    lr: 6.398379938945388e-05
    weight_decay: 1e-08
    dropout: 0.15697382123348755
    warmup_steps: 0.1 # Warmup steps
    steps_to_decay: 0.9 # T_max = (steps_per_epoch [282] * epochs_in_stage [30]) - warmup_steps
  autoformer:
    # embedding_dimension: [32] # Determines dimension of the embedding space
    num_encoder_layers: 2 # Number of transformer blocks stacked
    num_decoder_layers: 1 # Number of transformer blocks stacked
    n_heads: 8 # Number of heads for spatio-temporal attention
    dim_feedforward: 2048
    activation: gelu
    warmup_steps: 0.1 # Warmup steps
    steps_to_decay: 0.9 # T_max = (steps_per_epoch [282] * epochs_in_stage [30]) - warmup_steps
  spacetimeformer:
    # embedding_dimension: 32 # Determines dimension of the embedding space
    num_encoder_layers: 3 # Number of transformer blocks stacked
    num_decoder_layers: 3 # Number of transformer blocks stacked
    n_heads: 3 # Number of heads for spatio-temporal attention
    d_model: 200
    dim_feedforward: 800
    d_queries_keys: 30
    d_values: 30
    dropout_emb: 0.2
    dropout_attn_matrix: 0.0
    dropout_attn_out: 0.0
    dropout_ff: 0.3
    dropout_qkv: 0.0
    start_token_len: 0
    performer_redraw_interval: 100
    use_shifted_time_windows: False
    # decay_factor: 0.25
    # l2_coeff: 1e-6
    # class_loss_imp: 0.1
    pos_emb_type: abs
    embed_method: spatio-temporal
    activation: gelu
    use_given: False
    warmup_steps: 0.1 # Warmup steps
    steps_to_decay: 0.9 # T_max = (steps_per_epoch [282] * epochs_in_stage [30]) - warmup_steps
  svr:
    kernel: rbf
    C: 1.0
    degree: 3
    gamma: auto
    epsilon: 0.1
    cache_size: 7000
    n_neighboring_turbines: 5
  sf:
    n_neighboring_turbines: 6

callbacks:
  progress_bar:
    class_path: lightning.pytorch.callbacks.TQDMProgressBar
    init_args:
      refresh_rate: 100
      leave: true
  model_checkpoint:
    class_path: lightning.pytorch.callbacks.ModelCheckpoint
    init_args:
      dirpath: ${logging.checkpoint_dir}
      filename: '{epoch}-{step}-{val_loss:.2f}'
      monitor: 'val_loss'
      mode: 'min'
      save_top_k: 1
      save_last: true
      verbose: true
  model_checkpoint_periodic:
    class_path: lightning.pytorch.callbacks.ModelCheckpoint
    init_args:
      dirpath: ${logging.checkpoint_dir}
      filename: 'periodic-{epoch}-{step}'
      every_n_epochs: 5
      save_top_k: -1
      save_last: false
      monitor: null
      verbose: true
  lr_monitor:
    class_path: lightning.pytorch.callbacks.LearningRateMonitor
    init_args:
      logging_interval: step
      log_momentum: false
  dead_neuron_monitor:
    enabled: false
  marginal_health_monitor:
    enabled: false

trainer:
  val_check_interval: 1.0
  accelerator: gpu
  devices: auto
  num_nodes: 1
  strategy: ddp
  max_epochs: 100
  limit_train_batches: 5000
  log_every_n_steps: 100