## ============================================================================
## TACTiS-2 stage 1 PILOT tuning study WITH `a` regularization
## ============================================================================
## Purpose: validate that the soft-hinge L2 penalty on the DSF `a_pre` parameter
## prevents the unbounded steepness explosion observed in prior training (epoch 2
## had max-a=0.84, epoch 90+ plateaued at ~720). See:
##   /dss/work/taed7566/Forecasting_Outputs/wind-forecasting/logs/
##     tactis_inference_deep_diagnosis.md
##
## Differences from `training_inputs_juan_awaken_tune_storm_pred210.yaml`:
##   - prediction_length 210 -> 60 (reproduces broken-checkpoint horizon)
##   - context_length 600 -> 1200 (resampled to 15s gives 80 steps; matches
##     broken checkpoint context_length=80)
##   - total_study_trials 200 -> 40 (pilot scope; full retune happens after gate)
##   - max_epochs 40 -> 20 (pilot scope)
##   - run_name and chkp_dir_suffix tagged "_reg_pilot_v1"
##   - callbacks.marginal_health_monitor enabled (Optuna pruning on a explosion)
##   - lambda_a_reg added to tuning search space via tuning_phase=1 in
##     pytorch-transformer-ts/pytorch_transformer_ts/tactis_2/estimator.py
## ============================================================================

experiment:
  username: jmb0507
  project_name: tune_awaken_storm_pred60_reg_pilot
  run_name: tune_awaken_tactis_pred60_reg_pilot_v1
  project_root: /user/taed7566/Forecasting/wind-forecasting
  log_dir: /dss/work/taed7566/Forecasting_Outputs/wind-forecasting/logs/
  notes: "PILOT: TACTiS-2 stage 1 tuning with `a` regularization to fix flow collapse"
  extra_tags: ["tune", "tactis", "pred60", "reg_pilot", "stage1_only"]

logging:
  entity: jmb0507-cu-boulder
  wandb_mode: online
  save_code: false
  wandb_dir: /dss/work/taed7566/Forecasting_Outputs/wind-forecasting/logs
  optuna_dir: /dss/work/taed7566/Forecasting_Outputs/wind-forecasting/optuna
  checkpoint_dir: /dss/work/taed7566/Forecasting_Outputs/wind-forecasting/checkpoints
  chkp_dir_suffix: "_60_reg_pilot_v1"
  slurm_output_dir: /dss/work/taed7566/Forecasting_Outputs/wind-forecasting/logs/slurm_logs

optuna:
  save_trial_code: false
  n_trials_per_worker: 50
  total_study_trials: 100      # PILOT: moderate budget for 20 parallel workers (5 jobs × 4 H100s)
  max_epochs: 20               # PILOT: short trials; long enough to see flow collapse if it happens
  sampler: "tpe"               # TPE prioritizes exploiting good regions — good for narrow tuning
  sampler_params:
    tpe:
      n_startup_trials: 8
      multivariate: true
      constant_liar: true
      group: false
  base_limit_train_batches: 5000
  metric: "val_loss"
  direction: "minimize"

  resample_freq_choices: [15, 30, 45, 60]

  pruning:
    enabled: true
    type: "successivehalving"
    min_resource: 6        # Lower than p210 (12) since we have shorter trials
    reduction_factor: 2
    min_early_stopping_rate: 0
    bootstrap_count: 4

  visualization:
    enabled: true
    output_dir: ${logging.optuna_dir}/visualizations
    plots:
      optimization_history: true
      parameter_importance: true
      slice_plot: true

  storage:
    # SQLite chosen because compute nodes cannot resolve Aiven's public PostgreSQL host
    # (DNS NXDOMAIN observed on both cfdg002 and mpcg001 — see slurm_logs/dns_probe_*.out).
    # Prior pilot studies on this HPC also used SQLite — see existing files at
    # /dss/work/taed7566/Forecasting_Outputs/wind-forecasting/optuna/sqlite/.
    backend: "sqlite"
    sqlite_path: "/dss/work/taed7566/Forecasting_Outputs/wind-forecasting/optuna/sqlite/tuning_tactis_pred60_reg_pilot_v1.db"
    sqlite_wal: true       # Enable WAL mode for better concurrent-write performance
    sqlite_timeout: 600    # 10 min timeout to ride out lock contention from parallel workers

  dashboard:
    enabled: false
    port: 8088
    log_file: "${logging.optuna_dir}/optuna_dashboard.log"

dataset:
    sampler: "random"
    data_path: /dss/work/taed7566/Forecasting_Outputs/wind-forecasting/DATA/preprocessed_awaken_data/awaken_processed_normalized.parquet
    normalization_consts_path:  /dss/work/taed7566/Forecasting_Outputs/wind-forecasting/DATA/preprocessed_awaken_data/awaken_processed_normalization_consts.csv
    context_length: 1200    # 1200s / 15s resample = 80 steps (matches broken checkpoint context_length=80)
    prediction_length: 60   # 60s / 15s = 4 steps (matches broken checkpoint prediction_length=4)
    target_turbine_ids:
    normalize: true         # TACTiS-2 has internal StdScaler; normalized parquet is fine for it
    batch_size: 128
    base_batch_size: 128
    workers: 4
    overfit: false
    test_split: 0.20
    val_split: 0.10
    resample_freq: 15s
    n_splits: 1
    per_turbine_target: true
    use_pytorch_dataloader: true

model:
  distr_output:
    class: LowRankMultivariateNormalOutput
    kwargs:
      rank: 8

  ## TACTiS-2 hparams seeded from broken-checkpoint best-trial values.
  ## For tuning_phase=1, ALL of these are tuned per Optuna search space — these
  ## act as YAML defaults / fallback for non-tuned modes.
  tactis:
    initial_stage: 1
    stage2_start_epoch: 9999    # Forced by tuning_phase=1 (stage 1 only)
    ac_mlp_num_layers: 3
    ac_mlp_dim: 128
    stage1_activation_function: "relu"
    stage2_activation_function: "gelu"
    input_encoding_normalization: true
    scaling: "std"
    loss_normalization: "none"
    encoder_type: "standard"
    bagging_size: 64
    num_parallel_samples: 200
    # Marginal CDF Encoder (seeded from broken-ckpt hparams)
    marginal_embedding_dim_per_head: 128
    marginal_num_heads: 2
    marginal_num_layers: 3
    flow_input_encoder_layers: 4
    flow_series_embedding_dim: 32
    # Attentional Copula Encoder (Stage 2 — not exercised in pilot)
    copula_embedding_dim_per_head: 32
    copula_num_heads: 5
    copula_num_layers: 3
    copula_input_encoder_layers: 3
    copula_series_embedding_dim: 32
    # Decoder
    decoder_dsf_num_layers: 3
    decoder_dsf_hidden_dim: 48
    decoder_mlp_num_layers: 2
    decoder_mlp_hidden_dim: 32
    decoder_transformer_num_layers: 2
    decoder_transformer_embedding_dim_per_head: 32
    decoder_transformer_num_heads: 4
    decoder_num_bins: 50
    # Optimizer Params (seeded; lr_stage1 will be re-tuned in pilot)
    lr_stage1: 3.7e-4
    lr_stage2: 1e-7
    weight_decay_stage1: 1e-6
    weight_decay_stage2: 5e-6
    dropout_rate: 0.005
    gradient_clip_val_stage1: 0.5
    gradient_clip_val_stage2: 1.0
    # LR scheduler
    warmup_steps_s1: 0.10
    steps_to_decay_s1: 0.90
    eta_min_fraction_s1: 0.01
    warmup_steps_s2: 0.10
    steps_to_decay_s2: 0.90
    eta_min_fraction_s2: 0.5
    # NEW: DSF flow-collapse regularization
    # lambda_a_reg is tuned by Optuna in tuning_phase=1 (range [1e-5, 1.0] log-uniform)
    # a_reg_threshold stays fixed at 3.0 — well above healthy ~0.84 (epoch 2 measurement)
    lambda_a_reg: 1.0e-3      # Default seed; tuned per-trial
    a_reg_threshold: 3.0      # Fixed; not tuned in pilot

callbacks:
    progress_bar:
      class_path: lightning.pytorch.callbacks.TQDMProgressBar
      init_args:
        refresh_rate: 200
        leave: false
    model_checkpoint:
      class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        dirpath: ${logging.checkpoint_dir}
        filename: '{epoch}-{step}-{val_loss:.2f}'
        monitor: 'val_loss'
        mode: 'min'
        save_top_k: 1
        save_last: true
        verbose: true
    lr_monitor:
      class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: step
        log_momentum: false
    dead_neuron_monitor:
      enabled: false
    # NEW: Optuna-aware pruning of trials whose `a` parameter explodes despite
    # regularization. Without this, val_loss minimization REWARDS the collapsed
    # minimum (sharp CDFs give very negative NLL).
    # See pytorch_transformer_ts/tactis_2/callbacks.py for the underlying logic.
    marginal_health_monitor:
      enabled: true
      init_args:
        explode_threshold: 50.0   # Healthy max-a was 0.84 (epoch 2); collapsed was 720 (epoch 90+)
        only_stage: 1
        objective_metric: "val_total_nll_epoch"

trainer:
    val_check_interval: 1.0
    accelerator: gpu
    devices: auto
    num_nodes: 1
    strategy: ddp
    max_epochs: 20            # PILOT: matches optuna.max_epochs above
    limit_train_batches: 5000
    log_every_n_steps: 100
