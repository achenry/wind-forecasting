## ============================================================================
## TACTiS-2 PHASE 0g — log_density_max threshold sweep (base template)
## ============================================================================
## Base YAML for the 4-way sweep across log_density_max ∈ [-2.0, 0.0, 1.0, 3.0].
## The SBATCH script (tune_log_density_sweep.sh) generates 4 per-threshold YAMLs
## from this template via sed-replacing __LOG_DENSITY_MAX__ with the value, and
## launches one training job per threshold on its own GPU.
##
## ALL hparams except log_density_max are FIXED across the 4 runs. This gives
## a clean signal: any difference in max_a / max_log_density / val_marginal_logdet
## across the 4 runs is attributable to the threshold value alone.
##
## Trial #65 winning architecture is preserved (matches Phase 5 v1 + smoke v2).
## stage2_start_epoch=999 forces pure Stage 1 throughout — we only care about
## marginal-flow behavior here, not the copula.
##
## Compute budget: 15 epochs × 2000 batches × bs=64 = 1.92M samples per run.
## ~30-45 min on H100. 4 runs in parallel on cfdg002 → 30-45 min total wall.
## ============================================================================

experiment:
  username: jmb0507
  project_name: train_log_density_sweep_v2_phase0g
  run_name: log_density_sweep_thresh___LOG_DENSITY_MAX__
  project_root: /user/taed7566/Forecasting/wind-forecasting
  log_dir: /dss/work/taed7566/Forecasting_Outputs/wind-forecasting/logs/
  notes: "PHASE 0g — log_density_max threshold sweep (one of 4 parallel runs)"
  extra_tags: ["tactis2", "phase0g", "smoothed", "pred60", "ctx80", "log_density_sweep", "deeper_fix_v2", "thresh___LOG_DENSITY_MAX__"]

logging:
  entity: jmb0507-cu-boulder
  wandb_mode: online
  save_code: false
  wandb_dir: /dss/work/taed7566/Forecasting_Outputs/wind-forecasting/logs
  optuna_dir: /dss/work/taed7566/Forecasting_Outputs/wind-forecasting/optuna
  checkpoint_dir: /dss/work/taed7566/Forecasting_Outputs/wind-forecasting/checkpoints
  chkp_dir_suffix: "_log_density_sweep_thresh___LOG_DENSITY_MAX__"
  slurm_output_dir: /dss/work/taed7566/Forecasting_Outputs/wind-forecasting/logs/slurm_logs

optuna:
  visualization:
    enabled: false

dataset:
  sampler: "random"
  data_path: /dss/work/taed7566/Forecasting_Outputs/wind-forecasting/DATA/preprocessed_awaken_data/awaken_processed_smoothed_normalized.parquet
  normalization_consts_path: /dss/work/taed7566/Forecasting_Outputs/wind-forecasting/DATA/preprocessed_awaken_data/awaken_processed_smoothed_normalization_consts.csv
  context_length: 1200
  prediction_length: 60
  target_turbine_ids:
  normalize: false
  batch_size: 64
  base_batch_size: 128
  workers: 4
  overfit: false
  test_split: 0.10
  val_split: 0.10
  resample_freq: 15s
  n_splits: 1
  per_turbine_target: true
  use_pytorch_dataloader: true

model:
  distr_output:
    class: LowRankMultivariateNormalOutput
    kwargs:
      rank: 8

  ## TACTiS-2 — Trial #65 winning architecture (FIXED — same across all 4 sweep runs) ##
  tactis:
    initial_stage: 1
    stage2_start_epoch: 999           # FORCE pure Stage 1 throughout this sweep
    input_encoding_normalization: true
    scaling: "std"
    loss_normalization: "none"
    encoder_type: "standard"
    num_parallel_samples: 200
    bagging_size: null

    marginal_embedding_dim_per_head: 32
    marginal_num_heads: 4
    marginal_num_layers: 3
    flow_input_encoder_layers: 5
    flow_series_embedding_dim: 16

    copula_embedding_dim_per_head: 8
    copula_num_heads: 5
    copula_num_layers: 2
    copula_input_encoder_layers: 1
    copula_series_embedding_dim: 48
    ac_mlp_num_layers: 2
    ac_mlp_dim: 128

    decoder_dsf_num_layers: 3
    decoder_dsf_hidden_dim: 64
    decoder_mlp_num_layers: 2
    decoder_mlp_hidden_dim: 8
    decoder_transformer_num_layers: 4
    decoder_transformer_embedding_dim_per_head: 64
    decoder_transformer_num_heads: 5
    decoder_num_bins: 100

    stage1_activation_function: "relu"
    lr_stage1: 9.881673103861262e-06
    weight_decay_stage1: 0.0
    gradient_clip_val_stage1: 5.0
    eta_min_fraction_s1: 0.0010773892179890717
    warmup_steps_s1: 0.10
    steps_to_decay_s1: 0.90

    stage2_activation_function: "relu"
    lr_stage2: 2.0e-6
    weight_decay_stage2: 1.0e-5
    gradient_clip_val_stage2: 1.0
    eta_min_fraction_s2: 0.01
    warmup_steps_s2: 0.10
    steps_to_decay_s2: 0.90

    dropout_rate: 0.005

    # v1 reg (FIXED across sweep)
    lambda_a_reg: 0.45969083674293004
    a_reg_threshold: 3.0

    # v2 deeper-fix (lambda + a_max FIXED; only log_density_max varies)
    lambda_log_density: 0.5
    log_density_max: __LOG_DENSITY_MAX__   # SED-REPLACED per worker: -2.0, 0.0, 1.0, or 3.0
    a_max: 20.0

callbacks:
  progress_bar:
    class_path: lightning.pytorch.callbacks.TQDMProgressBar
    init_args:
      refresh_rate: 100
      leave: true
  model_checkpoint:
    class_path: lightning.pytorch.callbacks.ModelCheckpoint
    init_args:
      dirpath: ${logging.checkpoint_dir}
      filename: '{epoch}-{step}-{val_loss:.2f}'
      monitor: 'val_loss'
      mode: 'min'
      save_top_k: 1
      save_last: true
      verbose: true
  lr_monitor:
    class_path: lightning.pytorch.callbacks.LearningRateMonitor
    init_args:
      logging_interval: step
      log_momentum: false
  dead_neuron_monitor:
    enabled: false
  marginal_health_monitor:
    enabled: false                  # No-op in --mode train

trainer:
  val_check_interval: 1.0
  accelerator: gpu
  devices: auto
  num_nodes: 1
  strategy: ddp
  max_epochs: 15                    # SWEEP: longer than smoke (3) to give time for sharpening
  limit_train_batches: 2000         # SWEEP: 4× smoke (500) — more samples per epoch
  log_every_n_steps: 50
