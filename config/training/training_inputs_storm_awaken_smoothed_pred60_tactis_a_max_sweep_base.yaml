## ============================================================================
## TACTiS-2 PHASE 0g' — a_max threshold sweep (base template)
## ============================================================================
## Phase 0g revealed: smooth a-cap (a_max) is the DOMINANT regularizer for v2.
## All 4 log_density_max values produced near-identical end-states (max_a ≈
## 19.93, F⁻¹ mean ~1.46-1.56) because the cap was the binding constraint.
## But F⁻¹ MEDIAN was still 0.038 — most contexts still collapsed.
##
## Hypothesis: a tighter cap (smaller a_max) prevents the "winner-take-all"
## hidden unit dynamic where one a-value hits the cap and dominates the
## log_sum_exp, and forces multiple units to contribute → broader CDFs
## across more contexts → higher F⁻¹ MEDIAN.
##
## Sweep: a_max ∈ [3.0, 5.0, 10.0, 20.0]
## Fixed: log_density_max=0.0 (slight winner from 0g sweep)
##        lambda_a_reg=0.46, lambda_log_density=0.5
##        Trial #65 architecture, lr_stage1=9.88e-6
##
## Compute: 15 epochs × 2000 batches × bs=64 = 1.92M samples per run.
## SBATCH time limit raised to 2h (Phase 0g hit 1.5h timeout mid-validation).
## ============================================================================

experiment:
  username: jmb0507
  project_name: train_a_max_sweep_v2_phase0gp
  run_name: a_max_sweep_amax___A_MAX__
  project_root: /user/taed7566/Forecasting/wind-forecasting
  log_dir: /dss/work/taed7566/Forecasting_Outputs/wind-forecasting/logs/
  notes: "PHASE 0g' — a_max threshold sweep (one of 4 parallel runs). Hypothesis: tighter cap raises F⁻¹ MEDIAN."
  extra_tags: ["tactis2", "phase0gp", "smoothed", "pred60", "ctx80", "a_max_sweep", "deeper_fix_v2", "amax___A_MAX__"]

logging:
  entity: jmb0507-cu-boulder
  wandb_mode: online
  save_code: false
  wandb_dir: /dss/work/taed7566/Forecasting_Outputs/wind-forecasting/logs
  optuna_dir: /dss/work/taed7566/Forecasting_Outputs/wind-forecasting/optuna
  checkpoint_dir: /dss/work/taed7566/Forecasting_Outputs/wind-forecasting/checkpoints
  chkp_dir_suffix: "_a_max_sweep_amax___A_MAX__"
  slurm_output_dir: /dss/work/taed7566/Forecasting_Outputs/wind-forecasting/logs/slurm_logs

optuna:
  visualization:
    enabled: false

dataset:
  sampler: "random"
  data_path: /dss/work/taed7566/Forecasting_Outputs/wind-forecasting/DATA/preprocessed_awaken_data/awaken_processed_smoothed_normalized.parquet
  normalization_consts_path: /dss/work/taed7566/Forecasting_Outputs/wind-forecasting/DATA/preprocessed_awaken_data/awaken_processed_smoothed_normalization_consts.csv
  context_length: 1200
  prediction_length: 60
  target_turbine_ids:
  normalize: false
  batch_size: 64
  base_batch_size: 128
  workers: 4
  overfit: false
  test_split: 0.10
  val_split: 0.10
  resample_freq: 15s
  n_splits: 1
  per_turbine_target: true
  use_pytorch_dataloader: true

model:
  distr_output:
    class: LowRankMultivariateNormalOutput
    kwargs:
      rank: 8

  tactis:
    initial_stage: 1
    stage2_start_epoch: 999
    input_encoding_normalization: true
    scaling: "std"
    loss_normalization: "none"
    encoder_type: "standard"
    num_parallel_samples: 200
    bagging_size: null

    marginal_embedding_dim_per_head: 32
    marginal_num_heads: 4
    marginal_num_layers: 3
    flow_input_encoder_layers: 5
    flow_series_embedding_dim: 16

    copula_embedding_dim_per_head: 8
    copula_num_heads: 5
    copula_num_layers: 2
    copula_input_encoder_layers: 1
    copula_series_embedding_dim: 48
    ac_mlp_num_layers: 2
    ac_mlp_dim: 128

    decoder_dsf_num_layers: 3
    decoder_dsf_hidden_dim: 64
    decoder_mlp_num_layers: 2
    decoder_mlp_hidden_dim: 8
    decoder_transformer_num_layers: 4
    decoder_transformer_embedding_dim_per_head: 64
    decoder_transformer_num_heads: 5
    decoder_num_bins: 100

    stage1_activation_function: "relu"
    lr_stage1: 9.881673103861262e-06
    weight_decay_stage1: 0.0
    gradient_clip_val_stage1: 5.0
    eta_min_fraction_s1: 0.0010773892179890717
    warmup_steps_s1: 0.10
    steps_to_decay_s1: 0.90

    stage2_activation_function: "relu"
    lr_stage2: 2.0e-6
    weight_decay_stage2: 1.0e-5
    gradient_clip_val_stage2: 1.0
    eta_min_fraction_s2: 0.01
    warmup_steps_s2: 0.10
    steps_to_decay_s2: 0.90

    dropout_rate: 0.005

    lambda_a_reg: 0.45969083674293004
    a_reg_threshold: 3.0

    lambda_log_density: 0.5
    log_density_max: 0.0              # FIXED at 0g winner (marginal benefit but clear sign)
    a_max: __A_MAX__                  # SED-REPLACED per worker: 3.0, 5.0, 10.0, or 20.0

callbacks:
  progress_bar:
    class_path: lightning.pytorch.callbacks.TQDMProgressBar
    init_args:
      refresh_rate: 100
      leave: true
  model_checkpoint:
    class_path: lightning.pytorch.callbacks.ModelCheckpoint
    init_args:
      dirpath: ${logging.checkpoint_dir}
      filename: '{epoch}-{step}-{val_loss:.2f}'
      monitor: 'val_loss'
      mode: 'min'
      save_top_k: 1
      save_last: true
      verbose: true
  lr_monitor:
    class_path: lightning.pytorch.callbacks.LearningRateMonitor
    init_args:
      logging_interval: step
      log_momentum: false
  dead_neuron_monitor:
    enabled: false
  marginal_health_monitor:
    enabled: false

trainer:
  val_check_interval: 1.0
  accelerator: gpu
  devices: auto
  num_nodes: 1
  strategy: ddp
  max_epochs: 15
  limit_train_batches: 2000
  log_every_n_steps: 50
