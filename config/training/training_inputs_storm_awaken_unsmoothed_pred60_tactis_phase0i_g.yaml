## ============================================================================
## TACTiS-2 PHASE 0i-G PRODUCTION — Quantile-head marginal, pinball loss
## ============================================================================
## PLACEHOLDER — fill in winning (quantile_levels, crossing_fix, optional ES)
## from G-pilot results. See decision tree in
## /user/taed7566/.claude/plans/moonlit-sprouting-gosling.md
##
## Submit after G-pilot identifies winner:
##   eval "$(grep '^export LOCAL_PG_PASSWORD=' ~/.zshrc)"
##   sbatch --export=ALL,LOCAL_PG_PASSWORD train_phase0i_g.sh
##
## Pass criteria (validation):
##   - probe_sample_diversity median F^-1(0.95)-F^-1(0.05) > 1.0 std units
##   - sample-axis std > 0.3 m/s
##   - >70% turbines beat persistence on MAE (vs ~50% for Phase 0i-B; lead 3 was +1%)
##   - PIT-extreme < 30% (vs Phase 0i-B's 98%)
## ============================================================================

experiment:
  username: jmb0507
  project_name: train_phase0i_g_quantile_pinball
  run_name: phase0i_g_quantile_pinball
  project_root: /user/taed7566/Forecasting/wind-forecasting
  log_dir: /dss/work/taed7566/Forecasting_Outputs/wind-forecasting/logs/
  notes: "PHASE 0i-G production — Quantile head + pinball + ES (G4 pilot winner: F⁻¹ width 2.19 vs 0.026 baseline)"
  extra_tags: ["tactis2", "phase0i_g", "production", "quantile", "pinball+ES", "K11", "monotonic_delta", "unsmoothed"]

logging:
  entity: jmb0507-cu-boulder
  wandb_mode: online
  save_code: false
  wandb_dir: /dss/work/taed7566/Forecasting_Outputs/wind-forecasting/logs
  optuna_dir: /dss/work/taed7566/Forecasting_Outputs/wind-forecasting/optuna
  checkpoint_dir: /dss/work/taed7566/Forecasting_Outputs/wind-forecasting/checkpoints
  chkp_dir_suffix: "_phase0i_g_quantile_pinball"
  slurm_output_dir: /dss/work/taed7566/Forecasting_Outputs/wind-forecasting/logs/slurm_logs

optuna:
  visualization:
    enabled: false

dataset:
  sampler: "random"
  data_path: /dss/work/taed7566/Forecasting_Outputs/wind-forecasting/DATA/preprocessed_awaken_data/awaken_processed_unsmoothed_normalized.parquet
  normalization_consts_path: /dss/work/taed7566/Forecasting_Outputs/wind-forecasting/DATA/preprocessed_awaken_data/awaken_processed_unsmoothed_normalization_consts.csv
  context_length: 1200
  prediction_length: 60
  target_turbine_ids:
  normalize: false
  batch_size: 64
  base_batch_size: 128
  workers: 4
  overfit: false
  test_split: 0.10
  val_split: 0.10
  resample_freq: 15s
  n_splits: 1
  per_turbine_target: true
  use_pytorch_dataloader: true

model:
  distr_output:
    class: LowRankMultivariateNormalOutput
    kwargs:
      rank: 8

  tactis:
    initial_stage: 1
    stage2_start_epoch: 30
    input_encoding_normalization: true
    scaling: "std"
    loss_normalization: "none"
    encoder_type: "standard"
    num_parallel_samples: 200
    bagging_size: null

    marginal_embedding_dim_per_head: 32
    marginal_num_heads: 4
    marginal_num_layers: 3
    flow_input_encoder_layers: 5
    flow_series_embedding_dim: 16

    copula_embedding_dim_per_head: 8
    copula_num_heads: 5
    copula_num_layers: 2
    copula_input_encoder_layers: 1
    copula_series_embedding_dim: 48
    ac_mlp_num_layers: 2
    ac_mlp_dim: 128

    decoder_dsf_num_layers: 3
    decoder_dsf_hidden_dim: 64
    decoder_mlp_num_layers: 2
    decoder_mlp_hidden_dim: 8
    decoder_transformer_num_layers: 4
    decoder_transformer_embedding_dim_per_head: 64
    decoder_transformer_num_heads: 5
    decoder_num_bins: 100

    stage1_activation_function: "relu"
    lr_stage1: 9.881673103861262e-06
    weight_decay_stage1: 0.0
    gradient_clip_val_stage1: 5.0
    eta_min_fraction_s1: 0.0010773892179890717
    warmup_steps_s1: 0.10
    steps_to_decay_s1: 0.90

    stage2_activation_function: "relu"
    lr_stage2: 2.0e-6
    weight_decay_stage2: 1.0e-5
    gradient_clip_val_stage2: 1.0
    eta_min_fraction_s2: 0.01
    warmup_steps_s2: 0.10
    steps_to_decay_s2: 0.90

    dropout_rate: 0.005

    # DSF regularizers all disabled (quantile head bypasses DSF)
    lambda_a_reg: 0.0
    a_reg_threshold: 3.0
    lambda_log_density: 0.0
    log_density_max: 0.0
    a_max: 0.0
    lambda_a_floor: 0.0
    a_floor_threshold: 0.5
    lambda_w_entropy: 0.0
    w_entropy_min: 2.0

    # === Phase 0i-G Quantile marginal (G4 PILOT WINNER) ===
    # Pilot result: G4 (K=11, monotonic_delta, pinball+ES) gave F^-1 width 2.19 std-units
    # (8x DSF baseline of 0.27, well above >1.0 primary threshold). Pinball-only trials
    # G0-G3 all failed (F^-1 ~0.02-0.05); the Energy Score regularizer is what breaks
    # the collapse, and it works on top of the quantile head (unlike Phase 0i-D where
    # ES on top of DSF was attenuated by the inverse-DSF Jacobian).
    marginal_flow_type: quantile
    decoder_quantile_levels: [0.01, 0.05, 0.1, 0.25, 0.4, 0.5, 0.6, 0.75, 0.9, 0.95, 0.99]
    decoder_quantile_mlp_layers: 2
    decoder_quantile_mlp_dim: 64
    decoder_quantile_crossing_fix: monotonic_delta

    # === Sd Energy Score regularizer (G4 pilot winner — ENABLED in production) ===
    lambda_energy_score: 0.5   # G4 winning value
    energy_score_num_samples: 8
    lambda_variogram: 0.0      # Not used in G4 (variogram disabled)
    variogram_p: 0.5
    trajectory_noise_std: 0.0

callbacks:
  progress_bar:
    class_path: lightning.pytorch.callbacks.TQDMProgressBar
    init_args:
      refresh_rate: 100
      leave: true
  model_checkpoint:
    class_path: lightning.pytorch.callbacks.ModelCheckpoint
    init_args:
      dirpath: ${logging.checkpoint_dir}
      filename: '{epoch}-{step}-{val_loss:.2f}'
      monitor: 'val_loss'
      mode: 'min'
      save_top_k: 1
      save_last: true
      verbose: true
  model_checkpoint_periodic:
    class_path: lightning.pytorch.callbacks.ModelCheckpoint
    init_args:
      dirpath: ${logging.checkpoint_dir}
      filename: 'periodic-{epoch}-{step}'
      every_n_epochs: 5
      save_top_k: -1
      save_last: false
      monitor: null
      verbose: true
  lr_monitor:
    class_path: lightning.pytorch.callbacks.LearningRateMonitor
    init_args:
      logging_interval: step
      log_momentum: false
  dead_neuron_monitor:
    enabled: false
  marginal_health_monitor:
    enabled: false

trainer:
  val_check_interval: 1.0
  accelerator: gpu
  devices: auto
  num_nodes: 1
  strategy: ddp
  max_epochs: 100
  limit_train_batches: 5000
  log_every_n_steps: 100
