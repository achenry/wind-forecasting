experiment:
  run_name: tactis2_windfarm_subset_debug
  log_dir: /Users/ahenry/Documents/toolboxes/wind_forecasting/examples/logging/

dataset:
    data_path: examples/inputs/SMARTEOLE-WFC-open-dataset/processed/SMARTEOLE_WakeSteering_SCADA_1minData_normalized_train_ready.parquet
    normalization_consts_path: examples/inputs/SMARTEOLE-WFC-open-dataset/processed/SMARTEOLE_WakeSteering_SCADA_1minData _normalization_consts.csv
    context_length: 9
    prediction_length: 5
    target_turbine_ids:
    normalize: False
    batch_size: 32
    workers: 4
    overfit: False
    test_split: 0.20
    val_split: 0.10
    resample_freq: 60s
    n_splits: 1 # how many divisions of each continuity group to make which is further subdivided into training test and validation data
    per_turbine_target: False

model:
  distr_output:
    class: StudentTOutput
    kwargs: {}
  num_series: 10
  flow_series_embedding_dim: 16
  copula_series_embedding_dim: 16
  flow_input_encoder_layers: 2
  copula_input_encoder_layers: 2
  num_layers_encoder: 2
  num_decoder_layers: 2
  num_parallel_samples: 100
  scaling: mean

callbacks:
    progress_bar:
    early_stopping:
    model_checkpoint:
    lr_monitor: True

trainer: 
    # grad_clip_norm: 0.0 # Prevents gradient explosion if > 0 
    # limit_val_batches: 1.0 
    # val_check_interval: 1.0
    accelerator: gpu
    devices: auto
    num_nodes: 1
    strategy: auto
    # n_workers: auto
    # debug: False 
    # accumulate: 1.0
    max_epochs: 1 # Maximum number of epochs to train 100
    limit_train_batches: 50
    default_root_dir: /Users/ahenry/Documents/toolboxes/wind_forecasting/examples/checkpoints
    # precision: 32-true # 16-mixed enables mixed precision training 32-true is full precision
    # batch_size: 32 # larger = more stable gradients
    # lr: 0.0001 # Step size
    # dropout: 0.1 # Regularization parameter (prevents overfitting)
    # patience: 50 # Number of epochs to wait before early stopping
    # accumulate_grad_batches: 2 # Simulates a larger batch size

training:
  batch_size: 64
  num_batches_per_epoch: 50
